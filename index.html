<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gifty — Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">

const RAW_URL = "https://raw.githubusercontent.com/konst3658-crypto/claudes-folder/main/project%201/plans/%D0%9C%D0%90%D0%A1%D0%A2%D0%95%D0%A0-%D0%9F%D0%9B%D0%90%D0%9D.md";

const EMOJI_STATUS = { "✅": "done", "🔄": "active", "⏭": "next", "⏳": "planned", "⏸": "deferred" };
const STAGE_EMOJI  = { "✅": "🏁", "🔄": "🔧", "⏭": "🔜", "⏳": "📋", "⏸": "⏸" };

function parseMd(md) {
  const lines = md.split("\n");
  const stages = [];
  let current = null;
  let updatedLine = "";

  for (const line of lines) {
    // Updated date from "Где мы сейчас" section
    const dateMatch = line.match(/на (\d{4}-\d{2}-\d{2})/);
    if (dateMatch) updatedLine = dateMatch[1];

    // Stage header: ## Этап N — Name EMOJI
    const stageMatch = line.match(/^## Этап (\d+) — (.+?)\s*(✅|🔄|⏭|⏳|⏸)\s*$/);
    if (stageMatch) {
      current = {
        id: parseInt(stageMatch[1]),
        name: stageMatch[2].trim(),
        status: EMOJI_STATUS[stageMatch[3]] || "planned",
        emoji: STAGE_EMOJI[stageMatch[3]] || "📋",
        items: []
      };
      stages.push(current);
      continue;
    }

    // Item: - N.M EMOJI? text
    if (current) {
      const itemMatch = line.match(/^- (\d+\.\d+)\s*(✅|🔄|⏭|⏳|⏸)?\s*(.+)$/);
      if (itemMatch) {
        // strip trailing notes like "(закрыто...", "(перенесён...)"
        let label = itemMatch[3].trim().replace(/\s*\(закрыто[^)]*\)/gi, "").replace(/\s*\(перенесён[^)]*\)/gi, "").trim();
        // extract note in parens that starts with "отложено" or "перенесено"
        const noteMatch = itemMatch[3].match(/\(([^)]*(?:отложено|перенесено|отложен|перенесён)[^)]*)\)/i);
        current.items.push({
          id: itemMatch[1],
          status: EMOJI_STATUS[itemMatch[2]] || "planned",
          label: label,
          note: noteMatch ? "→ " + noteMatch[1].replace(/^.*до\s+/i, "").replace(/^.*в\s+/i, "").trim() : null
        });
      }
    }
  }
  return { stages, updated: updatedLine };
}

const statusColor = {
  done:     { bg: "bg-emerald-100", text: "text-emerald-700", dot: "bg-emerald-500", border: "border-emerald-200", bar: "bg-emerald-500" },
  active:   { bg: "bg-blue-100",    text: "text-blue-700",    dot: "bg-blue-500",    border: "border-blue-200",    bar: "bg-blue-500" },
  next:     { bg: "bg-amber-100",   text: "text-amber-700",   dot: "bg-amber-500",   border: "border-amber-200",   bar: "bg-amber-500" },
  planned:  { bg: "bg-gray-100",    text: "text-gray-500",    dot: "bg-gray-300",    border: "border-gray-200",    bar: "bg-gray-300" },
  deferred: { bg: "bg-purple-50",   text: "text-purple-500",  dot: "bg-purple-300",  border: "border-purple-100",  bar: "bg-purple-300" },
  todo:     { bg: "bg-gray-50",     text: "text-gray-400",    dot: "bg-gray-200",    border: "border-gray-100",    bar: "bg-gray-200" },
};
const statusLabel = {
  done: "✅ Готово", active: "🔄 В работе", next: "⏭ Следующий",
  planned: "⏳ Запланировано", deferred: "⏸ Перенесено", todo: "○ Не начато",
};

function StageCard({ stage, isExpanded, onToggle }) {
  const doneCount = stage.items.filter(i => i.status === "done").length;
  const pct = stage.items.length ? Math.round((doneCount / stage.items.length) * 100) : 0;
  const c = statusColor[stage.status] || statusColor.planned;
  return (
    <div className={`rounded-xl border-2 ${c.border} bg-white overflow-hidden shadow-sm`}>
      <button onClick={onToggle} className="w-full text-left p-4 flex items-center gap-3">
        <span className="text-2xl">{stage.emoji}</span>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-semibold text-gray-800">Этап {stage.id}</span>
            <span className="text-gray-600 truncate">{stage.name}</span>
            <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${c.bg} ${c.text}`}>
              {statusLabel[stage.status]}
            </span>
          </div>
          <div className="flex items-center gap-2 mt-1.5">
            <div className="flex-1 bg-gray-100 rounded-full h-1.5">
              <div className={`h-1.5 rounded-full transition-all ${c.bar}`} style={{width:`${pct}%`}} />
            </div>
            <span className="text-xs text-gray-400 whitespace-nowrap">{doneCount}/{stage.items.length}</span>
          </div>
        </div>
        <span className="text-gray-400 text-sm">{isExpanded ? "▲" : "▼"}</span>
      </button>
      {isExpanded && (
        <div className="border-t border-gray-100 px-4 pb-4 pt-3 space-y-1.5">
          {stage.items.map(item => {
            const ic = statusColor[item.status] || statusColor.planned;
            return (
              <div key={item.id} className={`flex items-start gap-2 rounded-lg px-3 py-2 ${ic.bg}`}>
                <div className={`w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${ic.dot}`} />
                <div className="flex-1 min-w-0">
                  <span className={`text-sm ${ic.text}`}>{item.id} — {item.label}</span>
                  {item.note && <span className="text-xs text-purple-400 ml-1">{item.note}</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function App() {
  const [data, setData] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [expanded, setExpanded] = React.useState(new Set());

  React.useEffect(() => {
    fetch(RAW_URL + "?t=" + Date.now())
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(md => {
        const parsed = parseMd(md);
        setData(parsed);
        // auto-expand active/next stages
        const autoOpen = new Set(parsed.stages.filter(s => s.status === "active" || s.status === "next").map(s => s.id));
        setExpanded(autoOpen);
      })
      .catch(e => setError(e.message));
  }, []);

  if (error) return (
    <div className="min-h-screen flex items-center justify-center text-red-400 text-sm">
      Ошибка загрузки: {error}
    </div>
  );
  if (!data) return (
    <div className="min-h-screen flex items-center justify-center text-gray-400 text-sm">
      Загружаю план...
    </div>
  );

  const toggle = id => setExpanded(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  const allItems   = data.stages.flatMap(s => s.items);
  const doneItems  = allItems.filter(i => i.status === "done").length;
  const totalItems = allItems.length;
  const pct = Math.round((doneItems / totalItems) * 100);
  const doneStages = data.stages.filter(s => s.status === "done").length;
  const nextStage  = data.stages.find(s => s.status === "active" || s.status === "next");

  return (
    <div className="min-h-screen bg-gray-50 p-4 md:p-8">
      <div className="max-w-2xl mx-auto space-y-6">

        <div className="text-center">
          <div className="text-4xl mb-2">🎁</div>
          <h1 className="text-2xl font-bold text-gray-900">Gifty</h1>
          <p className="text-gray-500 text-sm mt-1">Мобильное приложение для вишлистов · Дашборд прогресса</p>
          <p className="text-xs text-gray-400 mt-1">
            Данные из{" "}
            <a href="https://github.com/konst3658-crypto/claudes-folder/blob/main/project%201/plans/%D0%9C%D0%90%D0%A1%D0%A2%D0%95%D0%A0-%D0%9F%D0%9B%D0%90%D0%9D.md"
               target="_blank" className="underline hover:text-gray-600">МАСТЕР-ПЛАН.md</a>
            {data.updated && ` · обновлено ${data.updated}`}
          </p>
        </div>

        <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
          <div className="flex items-center justify-between mb-3">
            <span className="font-semibold text-gray-700">Общий прогресс</span>
            <span className="text-2xl font-bold text-emerald-600">{pct}%</span>
          </div>
          <div className="w-full bg-gray-100 rounded-full h-3">
            <div className="h-3 rounded-full bg-gradient-to-r from-emerald-400 to-emerald-600 transition-all" style={{width:`${pct}%`}} />
          </div>
          <div className="flex justify-between text-xs text-gray-400 mt-2">
            <span>{doneItems} задач выполнено</span>
            <span>{totalItems - doneItems} осталось</span>
          </div>
          <div className="grid grid-cols-3 gap-3 mt-5">
            {[
              { label: "Этапов закрыто", value: `${doneStages}/${data.stages.length}`, color: "text-emerald-600" },
              { label: "Сейчас",         value: nextStage ? `Этап ${nextStage.id}` : "—", color: "text-amber-600" },
              { label: "Задач готово",   value: `${doneItems}/${totalItems}`, color: "text-blue-600" },
            ].map(s => (
              <div key={s.label} className="text-center bg-gray-50 rounded-xl py-3">
                <div className={`text-lg font-bold ${s.color}`}>{s.value}</div>
                <div className="text-xs text-gray-400 mt-0.5 leading-tight">{s.label}</div>
              </div>
            ))}
          </div>
        </div>

        <div>
          <div className="flex items-center justify-between mb-3">
            <h2 className="font-semibold text-gray-700">Этапы</h2>
            <div className="flex gap-2">
              <button onClick={() => setExpanded(new Set(data.stages.map(s => s.id)))}
                className="text-xs text-gray-400 hover:text-gray-600">развернуть все</button>
              <span className="text-gray-200">|</span>
              <button onClick={() => setExpanded(new Set())}
                className="text-xs text-gray-400 hover:text-gray-600">свернуть</button>
            </div>
          </div>
          <div className="space-y-3">
            {data.stages.map(s => (
              <StageCard key={s.id} stage={s}
                isExpanded={expanded.has(s.id)}
                onToggle={() => toggle(s.id)} />
            ))}
          </div>
        </div>

        <p className="text-center text-xs text-gray-300 pb-4">
          Gifty · MVP · данные живые из репозитория
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
