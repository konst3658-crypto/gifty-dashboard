<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gifty — Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const stages = [
  {
    id: 1, name: "Фундамент", status: "done", emoji: "🏗️",
    items: [
      { id: "1.1", label: "Выбор BaaS (Supabase)", status: "done" },
      { id: "1.2", label: "Expo skeleton + тема", status: "done" },
      { id: "1.3", label: "Модель данных (12 таблиц)", status: "done" },
    ]
  },
  {
    id: 2, name: "Вход и профиль", status: "done", emoji: "👤",
    items: [
      { id: "2.1", label: "HTML-мокапы онбординга", status: "done" },
      { id: "2.2", label: "Email magic-link auth", status: "done" },
      { id: "2.3", label: "Handle-picker", status: "done" },
      { id: "2.4", label: "ProfileScreen RN-порт", status: "done" },
      { id: "2.5", label: "Публичная ссылка gifty.app/{handle}", status: "deferred", note: "→ Этап 8" },
    ]
  },
  {
    id: 3, name: "Вишлист", status: "active", emoji: "🎁",
    items: [
      { id: "3.1", label: "CRUD подарков через Supabase", status: "done" },
      { id: "3.2", label: "URL-парсер (title/image/price)", status: "deferred", note: "→ Этап 7" },
      { id: "3.3", label: "Публичный вишлист без авторизации", status: "deferred", note: "→ Этап 8" },
      { id: "3.4", label: "Share-sheet с готовым текстом", status: "deferred", note: "→ Этап 7" },
    ]
  },
  {
    id: 4, name: "Друзья и резерв", status: "done", emoji: "👥",
    items: [
      { id: "4.1", label: "Поиск пользователей по handle", status: "done" },
      { id: "4.2", label: "Запрос в друзья", status: "done" },
      { id: "4.3", label: "Просмотр чужого вишлиста", status: "done" },
      { id: "4.4", label: "Резерв подарка (RLS)", status: "done" },
      { id: "4.5", label: "Push-уведомления о друзьях", status: "deferred", note: "→ Этап 7" },
    ]
  },
  {
    id: 5, name: "События и календарь", status: "done", emoji: "📅",
    items: [
      { id: "5.1", label: "CRUD событий", status: "done" },
      { id: "5.2", label: "ДР из профиля → автособытие", status: "done" },
      { id: "5.3", label: "Агрегация событий на главной", status: "done" },
      { id: "5.4", label: "Push-напоминания", status: "deferred", note: "→ Этап 7" },
      { id: "5.5", label: "Календарный экран", status: "done" },
    ]
  },
  {
    id: 6, name: "Скидываемся", status: "done", emoji: "💬",
    items: [
      { id: "6.1", label: "HTML-мокап скрытого чата", status: "done" },
      { id: "6.2", label: "Pool CRUD + участники + RLS", status: "done" },
      { id: "6.3", label: "Realtime-чат (Supabase)", status: "done" },
      { id: "6.4", label: "Учёт вкладов, прогресс к цели", status: "done" },
      { id: "6.5", label: "Инвайт в pool", status: "deferred", note: "→ Этап 7" },
    ]
  },
  {
    id: 7, name: "Уведомления и финальная сборка", status: "next", emoji: "🔔",
    items: [
      { id: "7.1", label: "NotificationsScreen на реальных данных", status: "todo" },
      { id: "7.2", label: "Push через Expo Notifications", status: "todo" },
      { id: "7.3", label: "Deep-link из пуша", status: "todo" },
      { id: "7.4", label: "Empty/loading/error по всем экранам", status: "todo" },
      { id: "7.5", label: "Accessibility pass", status: "todo" },
      { id: "7.6", label: "Инвайт в pool (из 6.5)", status: "todo" },
      { id: "7.7", label: "URL-парсер вишлист-item (из 3.2)", status: "todo" },
      { id: "7.8", label: "Share-sheet (из 3.4)", status: "todo" },
    ]
  },
  {
    id: 8, name: "Предрелизная закалка", status: "planned", emoji: "🔒",
    items: [
      { id: "8.1", label: "Google OAuth", status: "todo" },
      { id: "8.2", label: "Apple OAuth + Face ID", status: "todo" },
      { id: "8.3", label: "Домен gifty.app + публичные ссылки", status: "todo" },
      { id: "8.4", label: "Аналитика", status: "todo" },
      { id: "8.5", label: "Crash reporting (Sentry)", status: "todo" },
      { id: "8.6", label: "Privacy Policy + ToS", status: "todo" },
      { id: "8.7", label: "Иконка, сплэш, стор-скриншоты", status: "todo" },
      { id: "8.8", label: "Соответствие 152-ФЗ", status: "todo" },
    ]
  },
  {
    id: 9, name: "Закрытая бета", status: "planned", emoji: "🧪",
    items: [
      { id: "9.1", label: "TestFlight + Internal Testing", status: "todo" },
      { id: "9.2", label: "Раздача 20-50 тестерам", status: "todo" },
      { id: "9.3", label: "Фидбек-раунд 1 → фиксы", status: "todo" },
      { id: "9.4", label: "Фидбек-раунд 2 → фиксы", status: "todo" },
      { id: "9.5", label: "Gate: crash-free >99%", status: "todo" },
    ]
  },
  {
    id: 10, name: "Запуск", status: "planned", emoji: "🚀",
    items: [
      { id: "10.1", label: "App Store Connect — сабмит", status: "todo" },
      { id: "10.2", label: "Google Play Console — сабмит", status: "todo" },
      { id: "10.3", label: "Раунды реджектов", status: "todo" },
      { id: "10.4", label: "Soft launch КЗ/УЗ/КГ", status: "todo" },
      { id: "10.5", label: "Мониторинг DAU/MAU", status: "todo" },
      { id: "10.6", label: "Hot-fix pipeline (EAS Update)", status: "todo" },
    ]
  },
];

const timeline = [
  { month: "Апр 2026", label: "Этапы 1–6", status: "done", current: true },
  { month: "Июн 2026", label: "Этап 7 — уведомления", status: "next" },
  { month: "Июл–Авг 2026", label: "Этап 8 — предрелиз", status: "planned" },
  { month: "Сен 2026", label: "Этап 9 — бета", status: "planned" },
  { month: "Окт–Ноя 2026", label: "Этап 10 — запуск 🎉", status: "planned" },
];

const statusColor = {
  done:     { bg: "bg-emerald-100", text: "text-emerald-700", dot: "bg-emerald-500", border: "border-emerald-200" },
  active:   { bg: "bg-blue-100",    text: "text-blue-700",    dot: "bg-blue-500",    border: "border-blue-200" },
  next:     { bg: "bg-amber-100",   text: "text-amber-700",   dot: "bg-amber-500",   border: "border-amber-200" },
  planned:  { bg: "bg-gray-100",    text: "text-gray-500",    dot: "bg-gray-300",    border: "border-gray-200" },
  deferred: { bg: "bg-purple-50",   text: "text-purple-500",  dot: "bg-purple-300",  border: "border-purple-100" },
  todo:     { bg: "bg-gray-50",     text: "text-gray-400",    dot: "bg-gray-200",    border: "border-gray-100" },
};

const statusLabel = {
  done: "✅ Готово", active: "🔄 В работе", next: "⏭ Следующий",
  planned: "⏳ Запланировано", deferred: "⏸ Перенесено", todo: "○ Не начато",
};

function StageCard({ stage, isExpanded, onToggle }) {
  const doneCount = stage.items.filter(i => i.status === "done").length;
  const pct = Math.round((doneCount / stage.items.length) * 100);
  const colors = statusColor[stage.status];
  return (
    <div className={`rounded-xl border-2 ${colors.border} bg-white overflow-hidden shadow-sm`}>
      <button onClick={onToggle} className="w-full text-left p-4 flex items-center gap-3">
        <span className="text-2xl">{stage.emoji}</span>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-semibold text-gray-800">Этап {stage.id}</span>
            <span className="text-gray-600 truncate">{stage.name}</span>
            <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${colors.bg} ${colors.text}`}>
              {statusLabel[stage.status]}
            </span>
          </div>
          <div className="flex items-center gap-2 mt-1.5">
            <div className="flex-1 bg-gray-100 rounded-full h-1.5">
              <div className={`h-1.5 rounded-full transition-all ${
                stage.status==='done'?'bg-emerald-500':stage.status==='next'?'bg-amber-500':stage.status==='active'?'bg-blue-500':'bg-gray-300'
              }`} style={{width:`${pct}%`}} />
            </div>
            <span className="text-xs text-gray-400 whitespace-nowrap">{doneCount}/{stage.items.length}</span>
          </div>
        </div>
        <span className="text-gray-400 text-sm">{isExpanded ? "▲" : "▼"}</span>
      </button>
      {isExpanded && (
        <div className="border-t border-gray-100 px-4 pb-4 pt-3 space-y-1.5">
          {stage.items.map(item => {
            const ic = statusColor[item.status];
            return (
              <div key={item.id} className={`flex items-start gap-2 rounded-lg px-3 py-2 ${ic.bg}`}>
                <div className={`w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${ic.dot}`} />
                <div className="flex-1 min-w-0">
                  <span className={`text-sm ${ic.text}`}>{item.id} — {item.label}</span>
                  {item.note && <span className="text-xs text-purple-400 ml-1">{item.note}</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function App() {
  const [expanded, setExpanded] = React.useState(new Set([7]));
  const toggle = id => setExpanded(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  const totalItems = stages.flatMap(s=>s.items).length;
  const doneItems  = stages.flatMap(s=>s.items).filter(i=>i.status==="done").length;
  const pct = Math.round((doneItems/totalItems)*100);

  return (
    <div className="min-h-screen bg-gray-50 p-4 md:p-8">
      <div className="max-w-2xl mx-auto space-y-6">
        <div className="text-center">
          <div className="text-4xl mb-2">🎁</div>
          <h1 className="text-2xl font-bold text-gray-900">Gifty</h1>
          <p className="text-gray-500 text-sm mt-1">Мобильное приложение для вишлистов · Дашборд прогресса</p>
          <p className="text-xs text-gray-400 mt-1">Обновлено: 21 апреля 2026</p>
        </div>

        <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
          <div className="flex items-center justify-between mb-3">
            <span className="font-semibold text-gray-700">Общий прогресс</span>
            <span className="text-2xl font-bold text-emerald-600">{pct}%</span>
          </div>
          <div className="w-full bg-gray-100 rounded-full h-3">
            <div className="h-3 rounded-full bg-gradient-to-r from-emerald-400 to-emerald-600" style={{width:`${pct}%`}} />
          </div>
          <div className="flex justify-between text-xs text-gray-400 mt-2">
            <span>{doneItems} задач выполнено</span>
            <span>{totalItems-doneItems} осталось</span>
          </div>
          <div className="grid grid-cols-4 gap-3 mt-5">
            {[
              {label:"Этапов закрыто", value:"6/10", color:"text-emerald-600"},
              {label:"Следующий",       value:"Этап 7", color:"text-amber-600"},
              {label:"Экранов готово",  value:"13",    color:"text-blue-600"},
              {label:"Релиз",           value:"Окт'26",color:"text-purple-600"},
            ].map(s=>(
              <div key={s.label} className="text-center bg-gray-50 rounded-xl py-3">
                <div className={`text-lg font-bold ${s.color}`}>{s.value}</div>
                <div className="text-xs text-gray-400 mt-0.5 leading-tight">{s.label}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
          <h2 className="font-semibold text-gray-700 mb-4">Таймлайн</h2>
          <div className="space-y-3">
            {timeline.map((t,i)=>{
              const c=statusColor[t.status];
              return (
                <div key={i} className="flex items-center gap-3">
                  <div className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${c.dot}`}/>
                  <div className={`text-sm font-medium w-28 flex-shrink-0 ${t.current?'text-emerald-700':c.text}`}>
                    {t.month}{t.current&&<span className="ml-1 text-xs bg-emerald-100 text-emerald-600 px-1.5 py-0.5 rounded-full">сейчас</span>}
                  </div>
                  <div className={`text-sm ${c.text}`}>{t.label}</div>
                </div>
              );
            })}
          </div>
        </div>

        <div>
          <div className="flex items-center justify-between mb-3">
            <h2 className="font-semibold text-gray-700">Этапы</h2>
            <div className="flex gap-2">
              <button onClick={()=>setExpanded(new Set(stages.map(s=>s.id)))} className="text-xs text-gray-400 hover:text-gray-600">развернуть все</button>
              <span className="text-gray-200">|</span>
              <button onClick={()=>setExpanded(new Set())} className="text-xs text-gray-400 hover:text-gray-600">свернуть</button>
            </div>
          </div>
          <div className="space-y-3">
            {stages.map(s=><StageCard key={s.id} stage={s} isExpanded={expanded.has(s.id)} onToggle={()=>toggle(s.id)}/>)}
          </div>
        </div>

        <p className="text-center text-xs text-gray-300 pb-4">Gifty · MVP под новогодний сезон 2026</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
